{% extends "base.html" %}
{% block title %}Week Dates — {{ season.name }}{% endblock %}

{% block content %}
<h4>Week Dates — {{ season.name }}</h4>
<form method="post">
  <table class="table table-sm">
    <thead>
      <tr><th>Week</th><th>Date</th><th>Position Night</th><th>Tournament Type</th></tr>
    </thead>
    <tbody>
      {% for wk in weeks %}
      <tr>
        <td>{{ wk.week_num }}</td>
        <td>
          <input type="date" name="date_{{ wk.week_num }}" class="form-control form-control-sm"
                 value="{{ wk.date.isoformat() if wk.date else '' }}" style="width:160px">
        </td>
        <td>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" name="pos_{{ wk.week_num }}"
                   {{ 'checked' if wk.is_position_night else '' }}>
          </div>
        </td>
        <td>
          <select name="tournament_{{ wk.week_num }}" class="form-select form-select-sm" style="width:220px">
            {% for val, label in tournament_types %}
            <option value="{{ val }}" {{ 'selected' if wk.tournament_type == val else '' }}>{{ label }}</option>
            {% endfor %}
          </select>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <button type="submit" class="btn btn-primary">Save Dates</button>
  <a href="{{ url_for('admin.season_detail', season_id=season.id) }}" class="btn btn-outline-secondary ms-2">Back</a>
</form>
{% endblock %}
